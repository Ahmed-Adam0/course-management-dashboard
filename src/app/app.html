<mat-toolbar color="primary" class="main-toolbar mat-elevation-z2">
  <span class="logo-text" routerLink="/courses">
    <mat-icon class="logo-icon">school</mat-icon> {{ translate.get('logo_title') }}
  </span>
  <span class="toolbar-spacer"></span>
  <button mat-button class="lang-toggle-btn" (click)="translate.toggleLanguage()">
    <mat-icon>language</mat-icon> {{ translate.currentLang() === 'en' ? 'العربية' : 'English' }}
  </button>
  <button mat-icon-button class="theme-toggle-btn" (click)="theme.toggleTheme()" [title]="theme.isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
    <mat-icon>{{ theme.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
  <span class="user-profile">
    <mat-icon>account_circle</mat-icon> {{ translate.get('admin_profile') }}
  </span>
</mat-toolbar>

<main class="app-content">
  <router-outlet></router-outlet>
</main>

@if (showScrollButton()) {
  <button mat-fab color="accent" class="scroll-to-top-btn" (click)="scrollToTop()" title="Scroll to Top">
    <mat-icon>arrow_upward</mat-icon>
  </button>
}
